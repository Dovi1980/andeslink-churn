# environment.yml — raíz del proyecto
name: andeslink-churn
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - jupyterlab
  - jupyter
  - ipywidgets
  - pandas
  - numpy
  - scikit-learn
  - xgboost
  - matplotlib
  - seaborn
  - pyyaml
  - pip:
      - dvc
      - mlflow
      - scikit-learn-extra
      - fastapi
      - uvicorn[standard]
      - streamlit
      - pydantic
      - joblib
      - python-dotenv
      - pytest
      - httpx
      - evidently
      - prometheus-fastapi-instrumentator
